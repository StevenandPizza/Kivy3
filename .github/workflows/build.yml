name: CI
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Thiết lập Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. Cài đặt các thư viện hệ thống
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev libssl-dev libffi-dev zip unzip autoconf libtool pkg-config

      # 3. Cài đặt Android API 35 THẬT CHUẨN
      # 3.5 Sửa lỗi đường dẫn sdkmanager và cài API 35
      - name: Install Android API 35
        run: |
          # 1. Tạo thư mục mà Buildozer mong muốn
          sudo mkdir -p /usr/local/lib/android/sdk/tools/bin
          
          # 2. Tạo "cầu nối" từ sdkmanager thật sang chỗ Buildozer tìm
          sudo ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager /usr/local/lib/android/sdk/tools/bin/sdkmanager
          
          # 3. Bây giờ mới cài API 35 (Lệnh này giờ sẽ chạy được)
          echo "y" | /usr/local/lib/android/sdk/tools/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-35" "build-tools;35.0.0"
      # 4. Thiết lập Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 5. Cài đặt Buildozer và Cython
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "buildozer>=1.5.0" "cython<3.0"

      # 6. Build App (Sử dụng các Secret đã đặt)
      - name: Build with Buildozer
        env:
          P4A_RELEASE_KEYSTORE: steven.keystore
          P4A_RELEASE_KEYALIAS: stevenapp
          P4A_RELEASE_KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          ACCEPT_SDK_LICENSE: "True"
          # Ép Buildozer nhận diện API 35 từ môi trường
          ANDROIDAPI: "35"
          ANDROIDSDK: "/usr/local/lib/android/sdk"
        run: |
          buildozer android release

      # 7. Upload thành phẩm
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RandomSTEVEN-API35-Package
          path: bin/*
