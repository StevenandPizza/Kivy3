name: CI
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev ffmpeg \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev libsqlite3-dev sqlite3 bzip2 libbz2-dev libssl-dev \
            libffi-dev zip unzip autoconf libtool pkg-config liblzma-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "buildozer==1.5.0" "cython==0.29.37"

      - name: Build APK
        run: buildozer android release

      - name: Sign APK manually
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "build-tools;35.0.0"

          BUILD_TOOLS=$ANDROID_SDK_ROOT/build-tools/35.0.0
          APK=$(find bin -name "*.apk" | head -1)
          ALIGNED_APK="${APK%.apk}-aligned.apk"
          SIGNED_APK="${APK%.apk}-signed.apk"

          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

          $BUILD_TOOLS/zipalign -v 4 "$APK" "$ALIGNED_APK"

          $BUILD_TOOLS/apksigner sign \
            --ks keystore.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"

          echo "SIGNED_APK=$SIGNED_APK" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RandomSTEVEN-APK-Signed
          path: ${{ env.SIGNED_APK }}
