name: CI
on:
  push:
    branches: [ main ]

# Thần chú để bỏ qua cảnh báo Node.js và ép chạy bản mới nhất
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Thiết lập Java 17 (Cần thiết cho Android API cao)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. Cài đặt các thư viện hệ thống
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3-dev \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            libssl-dev \
            libffi-dev \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config

      # 3. Cài đặt Android API 35 và cấu hình đường dẫn tuyệt đối
      - name: Install Android API 35
        run: |
          # Chấp nhận bản quyền và cài đặt API 35 + Build Tools 35
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platforms;android-35" "build-tools;35.0.0"
          
          # Tạo đường dẫn "giả" để đánh lừa Buildozer cũ nếu nó tìm thư mục /tools
          sudo mkdir -p $ANDROID_HOME/tools/bin
          sudo ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager

      # 4. Thiết lập Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 5. Cài đặt Buildozer và Cython
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install "buildozer>=1.5.0" "cython<3.0"

      # 6. Build App (Ép robot nhìn đúng kho SDK hệ thống)
      - name: Build with Buildozer
        env:
          # Các Secret để ký tên app
          P4A_RELEASE_KEYSTORE: steven.keystore
          P4A_RELEASE_KEYALIAS: stevenapp
          P4A_RELEASE_KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          
          # Ép Buildozer dùng SDK của hệ thống nơi đã cài API 35
          ANDROIDSDK: /usr/local/lib/android/sdk
          ANDROIDNDK: /usr/local/lib/android/sdk/ndk/27.3.13750724
          ANDROIDAPI: "35"
          ACCEPT_SDK_LICENSE: "True"
        run: |
          buildozer android release

      # 7. Upload thành phẩm (Hốt tất cả file trong bin)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RandomSTEVEN-Package-API35
          path: bin/*
